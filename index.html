  const map=new Map();
  (Array.isArray(list)?list:[]).forEach(x=>{
    if(!x) return;
    const username=String(x.username||"").trim().toLowerCase();
    if(!username || username==="admin") return;
    const deletedAt=Number(x.deletedAt||0);
    const prev=map.get(username);
    if(!prev || deletedAt>prev.deletedAt){

    }
  });
  return [...map.values()];
}

function newRecordId(){
  // Numérico para mantener compatibilidad con onclick sin comillas.
  return Date.now()*1000 + Math.floor(Math.random()*1000);

function normalizeRecord(r){
  if(!r) return r;
  if(!r.id) r.id=newRecordId();
  if(!r._updatedAt) r._updatedAt=Date.now();
  if(!r._clientId) r._clientId=DEVICE_ID;

}

function touchRecord(r){
  if(!r) return r;
  normalizeRecord(r);
  r._updatedAt=Date.now();
  r._clientId=DEVICE_ID;
  delete r._deleted;
  return r;
}
function normalizeDeletedRecord(d){
  if(!d) return d;
  if(!d.id) return null;
  if(!d.deletedAt) d.deletedAt=Date.now();
  if(!d.clientId) d.clientId=DEVICE_ID;
  return d;
}
function mergeDeletedRecords(remoteDeleted=[], localDeleted=[]){
  const map=new Map();
  [...(remoteDeleted||[]),...(localDeleted||[])].forEach(d=>{
    d=normalizeDeletedRecord(d);
    if(!d) return;
    const key=String(d.id);
    const old=map.get(key);
    if(!old || Number(d.deletedAt||0)>=Number(old.deletedAt||0)){
      map.set(key, JSON.parse(JSON.stringify(d)));
    }
  });
  return Array.from(map.values());
}
function deletedAtFor(id, deletedList=deletedRecords){
  const key=String(id);
  let t=0;
  (deletedList||[]).forEach(d=>{
    if(String(d.id)===key) t=Math.max(t,Number(d.deletedAt||0));
  });
  return t;
}

function addDeletedTombstone(id, deletedAt=Date.now()){

function queueRecordUpsert(r){
  touchRecord(r);

  // Mantener solo la última edición pendiente de este registro.
  offlineOps=offlineOps.filter(op=>!(String(op.id)===String(r.id) && op.type==="upsert"));
  offlineOps.push({
    opId:"op_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,8),
    type:"upsert",
    id:r.id,
    record:JSON.parse(JSON.stringify(r)),

  updateSyncDotVisual();

function queueRecordDelete(r){
  if(!r) return;
  normalizeRecord(r);
  const deletedAt=Date.now();
  addDeletedTombstone(r.id,deletedAt);

  // Si había una edición/agregado pendiente de ese mismo registro,
  // se elimina para que no lo resucite después.
  offlineOps=offlineOps.filter(op=>!(String(op.id)===String(r.id) && op.type==="upsert"));

  offlineOps.push({

    type:"delete",
    id:r.id,

function recordTimestamp(r){
  return Number(r?._updatedAt || 0);
}
function shouldKeepRecord(r, deletedList){
  if(!r || r._deleted) return false;
  normalizeRecord(r);
  return recordTimestamp(r)>deletedAtFor(r.id,deletedList);
}
function mergeRecords(remoteRecords=[], localRecords=[], deletedList=deletedRecords){
  const map=new Map();
  (remoteRecords||[]).forEach(r=>{
    if(!shouldKeepRecord(r,deletedList)) return;
    map.set(String(r.id), JSON.parse(JSON.stringify(r)));
  });
  (localRecords||[]).forEach(r=>{
    if(!shouldKeepRecord(r,deletedList)) return;
    const key=String(r.id);
    const old=map.get(key);
    if(!old || recordTimestamp(r)>=recordTimestamp(old)){
      map.set(key, JSON.parse(JSON.stringify(r)));
    }
  });
  return Array.from(map.values()).sort((a,b)=>{
    if(String(a.date)===String(b.date)) return Number(a.id)-Number(b.id);
    return String(a.date).localeCompare(String(b.date));
  });
}
function applyOpsToState(records, deletedList, ops){
  let tombstones=mergeDeletedRecords(deletedList,deletedRecords);
  const map=new Map();
  (records||[]).forEach(r=>{
    if(!shouldKeepRecord(r,tombstones)) return;
    map.set(String(r.id), JSON.parse(JSON.stringify(r)));
  });

  (ops||[]).forEach(op=>{
    const key=String(op.id);
    if(op.type==="delete"){
      tombstones=mergeDeletedRecords(tombstones,[{
        id:op.id,
        deletedAt:op.deletedAt||op.ts||Date.now(),
        clientId:op.clientId||DEVICE_ID
      }]);
      map.delete(key);
    }else if(op.type==="upsert" && op.record){
      const rec=normalizeRecord(JSON.parse(JSON.stringify(op.record)));
      const delAt=deletedAtFor(rec.id,tombstones);
      if(recordTimestamp(rec)>delAt){
        tombstones=tombstones.filter(d=>String(d.id)!==String(rec.id));
        const old=map.get(key);
        if(!old || recordTimestamp(rec)>=recordTimestamp(old)){
          map.set(key,rec);
        }
      }
    }
  });

  return {
    records:Array.from(map.values()).sort((a,b)=>{
      if(String(a.date)===String(b.date)) return Number(a.id)-Number(b.id);
      return String(a.date).localeCompare(String(b.date));
    }),
    deletedRecords:tombstones
  };
}
function applyOpsToRecords(records, ops, remoteDeleted=[]){
  return applyOpsToState(records, mergeDeletedRecords(remoteDeleted,deletedRecords), ops).records;

function dbIsSynced(){
  // La barra azul significa: no quedan operaciones locales pendientes
  // y Supabase confirmó la última subida de operaciones.
  return !!(
    deviceHasConnection() &&
    nexusCloud.ready &&
    nexusCloud.lastSyncOk &&
    !nexusCloud.error &&
    !nexusCloud.syncing &&
    !offlineOps.length
  );
}

  if(!line) return;
  const ok=dbIsSynced();
  line.classList.toggle("synced",ok);

function lockedAction(key, fn, delay=520, ev){
  if(ev){
    ev.preventDefault?.();
    ev.stopPropagation?.();
  }
  state.actionLocks = state.actionLocks || {};
  if(state.actionLocks[key]) return false;
  state.actionLocks[key]=true;

  const el = ev?.currentTarget;
  if(el) el.classList.add("tap-locked");

  try{
    fn();
  }finally{
    setTimeout(()=>{
      state.actionLocks[key]=false;
      if(el) el.classList.remove("tap-locked");
    },delay);
  }
  return false;
}

function allAccounts(){

  users.forEach(u=>{ if(u.account) base.push(u.account); });
  return [...new Set(base)].filter(Boolean);
}

function rows(a,c){return data.filter(r=>!r._deleted&&r.account===a&&r.currency===c)}
function balance(a,c){return rows(a,c).reduce((s,r)=>s+r.entry-r.exit,0)}
function unitToDays(q,u){
  q=Math.max(1,Number(q||1));
  return u==="semana"?q*7:u==="mes"?q*30:q;
}
function avgDays(){
  const s=settings();
  return unitToDays(s.avgQty || s.lookbackDays || 30, s.avgUnit || "dia");
}
function coverageDays(){
  const s=settings();
  return unitToDays(s.coverageQty||1, s.coverageUnit||"dia");
}
function avgExit(a,c){
  const days=avgDays();
  const arr=rows(a,c).filter(r=>Number(r.exit||0)>0);
  if(!arr.length) return 0;

  // Se toma como referencia la fecha más reciente existente en esa tabla.
  // Si el historial tiene menos días que los configurados, se suman los disponibles
  // y se divide igualmente entre la cantidad definida en ajustes.
  const latestDate=arr.reduce((max,r)=>r.date>max?r.date:max,arr[0].date);
  const end=new Date(latestDate+"T23:59:59");
  const start=new Date(end);
  start.setDate(end.getDate()-(days-1));
  start.setHours(0,0,0,0);

  const sum=arr.filter(r=>{
    const d=new Date(r.date+"T12:00:00");
    return d>=start && d<=end;
  }).reduce((s,r)=>s+Number(r.exit||0),0);

  return sum/days;
}
function level(a,c){
  const fullLevel=Math.max(avgExit(a,c),1)*coverageDays();
  let pct=Math.max(0,Math.min(100,Math.round(balance(a,c)/fullLevel*100)));
  let step=pct>=75?4:pct>=50?3:pct>=25?2:1;
  return {pct:pct,step:step,cls:step===4?"ok":step===1?"low":"mid",label:step===4?"Bien":step===1?"Bajo":"Medio"};
}
function total(c){return accounts().reduce((s,a)=>s+balance(a,c),0)}
function generalAvgExit(c){return accounts().reduce((s,a)=>s+avgExit(a,c),0)}

function monthKey(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
}
function monthLabel(key){
  const [y,m]=key.split("-").map(Number);
  return new Date(y,m-1,1).toLocaleDateString("es-ES",{month:"long",year:"numeric"});
}
function daysForMonthAverage(key){
  const [y,m]=key.split("-").map(Number);
  const now=new Date();
  const isCurrent = y===now.getFullYear() && m===now.getMonth()+1;
  if(isCurrent) return Math.max(1,now.getDate());
  return new Date(y,m,0).getDate();
}
function lastThreeMonths(){
  const now=new Date();
  const arr=[];
  for(let i=0;i<3;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    arr.push(monthKey(d));
  }
  return arr;
}
function monthlyStats(a,c){
  return lastThreeMonths().map(k=>{
    const totalExit=rows(a,c).filter(r=>String(r.date||"").slice(0,7)===k).reduce((s,r)=>s+Number(r.exit||0),0);
    const days=daysForMonthAverage(k);
    return {key:k,label:monthLabel(k),totalExit,avg:totalExit/days,days};
  });
}

function monthlyStatsForAccounts(list,c){

function navigationSnapshot(){

function sameNavigation(a,b){
  if(!a || !b) return false;
  return a.view===b.view &&
    a.account===b.account &&
    a.currency===b.currency &&
    a.pendingOnly===b.pendingOnly &&
    a.tableFilterDate===b.tableFilterDate &&
    a.tableFilterType===b.tableFilterType &&
    a.statsAccount===b.statsAccount;
}
function pushNavigation(){
  if(state.suppressHistory) return;
  const snap=navigationSnapshot();
  const last=state.navStack[state.navStack.length-1];
  if(!sameNavigation(last,snap)){
    state.navStack.push(snap);
    if(state.navStack.length>40) state.navStack.shift();
  }
  try{
    window.history.pushState({nexus:true,depth:state.navStack.length}, "", location.pathname + location.search + "#"+(state.view||"home"));
  }catch(e){}
}
function restoreNavigation(snap){
  if(!snap) return;
  Object.assign(state,snap);
  state.drawer=false;
  state.exportOpen=false;
  state.editOpen=false;
  state.addOpen=false;
  state.countOpen=false;
  state.userCreateOpen=false;
  state.userEditOpen=false;
  state.dateFilterOpen=false;
  state.confirmOpen=false;

}
function hasOpenOverlay(){

    state.drawer ||
    state.exportOpen ||
    state.editOpen ||

    state.countOpen ||

    state.userEditOpen ||
    state.dateFilterOpen ||

}
function isMenuPage(){

}
function canGoBack(){
  // En Inicio y Tabla no se permite atrás ni por botón ni por gesto.
  if(!hasOpenOverlay() && (state.view==="home" || state.view==="table")) return false;
  return hasOpenOverlay() || (!!state.menuReturn && isMenuPage());
}
function restoreMenuReturn(){
  if(!state.menuReturn) return false;
  const snap = state.menuReturn;
  state.menuReturn = null;
  Object.assign(state,snap);
  state.drawer=false;
  state.exportOpen=false;
  state.editOpen=false;
  state.addOpen=false;
  state.countOpen=false;
  state.userCreateOpen=false;
  state.userEditOpen=false;
  state.dateFilterOpen=false;
  state.confirmOpen=false;
  render();
  return true;
}
function goBack(){
  // Bloqueo explícito: en Inicio y Tabla no hace nada.
  if(!hasOpenOverlay() && (state.view==="home" || state.view==="table")) return;

  if(state.confirmOpen){state.confirmOpen=false;render();return;}
  if(state.dateFilterOpen){state.dateFilterOpen=false;render();return;}
  if(state.userCreateOpen){state.userCreateOpen=false;render();return;}
  if(state.userEditOpen){state.userEditOpen=false;state.userEditUsername=null;render();return;}
  if(state.addOpen){state.addOpen=false;render();return;}
  if(state.editOpen){state.editOpen=false;state.editId=null;render();return;}
  if(state.countOpen){state.countOpen=false;render();return;}
  if(state.exportOpen){
    state.exportOpen=false;
    if(restoreMenuReturn()) return;
    render();
    return;
  }
  if(state.drawer){
    state.drawer=false;
    state.menuReturn=null;
    render();
    return;
  }
  if(isMenuPage() && state.menuReturn){
    restoreMenuReturn();
    return;
  }
}

function setupBackGestures(){
  if(window.__nexusBackGesturesReady) return;
  window.__nexusBackGesturesReady=true;

  try{
    window.history.replaceState({nexus:true,depth:0}, "", location.pathname + location.search + "#home");
  }catch(e){}

  window.addEventListener("popstate", e=>{
    if(state && state.user && canGoBack()){
      goBack();
    }
  });

  let startX=0,startY=0,startT=0;
  document.addEventListener("touchstart",e=>{
    if(!e.touches || e.touches.length!==1) return;
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    startT=Date.now();
  },{passive:true});

  document.addEventListener("touchend",e=>{
    if(!e.changedTouches || e.changedTouches.length!==1) return;
    const endX=e.changedTouches[0].clientX;
    const endY=e.changedTouches[0].clientY;
    const dx=endX-startX;
    const dy=Math.abs(endY-startY);
    const dt=Date.now()-startT;
    if(startX<28 && dx>80 && dy<70 && dt<700 && state && state.user && canGoBack()){
      goBack();
    }
  },{passive:true});
}
setupBackGestures();

function getScrollState(){
  const wrap = document.querySelector('.tablewrap');
  const pos = {
    wx: window.scrollX || 0,
    wy: window.scrollY || 0,
    tx: wrap ? wrap.scrollLeft : 0,
    ty: wrap ? wrap.scrollTop : 0
  };
  state.lastTableScroll = pos;
  return pos;
}
function restoreScrollState(pos){
  if(!pos) pos = state.lastTableScroll || {wx:0,wy:0,tx:0,ty:0};

  const apply = ()=>{
    window.scrollTo(pos.wx || 0, pos.wy || 0);
    const wrap = document.querySelector('.tablewrap');
    if(wrap){
      wrap.scrollLeft = pos.tx || 0;
      wrap.scrollTop = pos.ty || 0;
    }
  };

  apply();
  requestAnimationFrame(apply);
  setTimeout(apply,30);
  setTimeout(apply,90);
  setTimeout(apply,180);
}
function rememberTableScroll(){
  const wrap = document.querySelector('.tablewrap');
  if(wrap){
    state.lastTableScroll = {
      wx: window.scrollX || 0,
      wy: window.scrollY || 0,
      tx: wrap.scrollLeft || 0,
      ty: wrap.scrollTop || 0
    };
  }
}
function renderKeepScroll(){
  const pos = getScrollState();
  state.keepTableScrollOnce = true;
  render();
  restoreScrollState(pos);
}

function saveAdminSettings(){
  let s=settings();

  const covEl=document.getElementById("coverageQty");
  const avgEl=document.getElementById("avgQty");

  const covVal=covEl ? String(covEl.value).trim() : "";
  const avgVal=avgEl ? String(avgEl.value).trim() : "";

  if(covVal !== "") s.coverageQty=Math.max(1,Number(covVal)||s.coverageQty||1);
  s.coverageUnit=document.getElementById("coverageUnit")?.value||s.coverageUnit;

  if(avgVal !== "") s.avgQty=Math.max(1,Number(avgVal)||s.avgQty||s.lookbackDays||30);
  s.avgUnit=document.getElementById("avgUnit")?.value||s.avgUnit||"dia";
  s.lookbackDays=unitToDays(s.avgQty,s.avgUnit);

  s.appearance=document.getElementById("appearance")?.value||s.appearance;

function ensureAccountTables(account){
  if(!account) return;
  if(!allAccounts().includes(account)){
    const today = new Date().toISOString().slice(0,10);
    const cup = touchRecord({
      id: newRecordId(),
      account,
      currency:"CUP",
      date:today,
      entry:0,
      exit:0,
      desc:"Tabla creada",
      confirmed:true
    });
    const usd = touchRecord({
      id: newRecordId(),
      account,
      currency:"USD",
      date:today,
      entry:0,
      exit:0,
      desc:"Tabla creada",
      confirmed:true
    });
    data.push(cup);
    data.push(usd);
    queueRecordUpsert(cup);
    queueRecordUpsert(usd);
    persistRecords();
  }
}
function renameAccountIfSafe(oldAccount,newAccount){
  if(!oldAccount || !newAccount || oldAccount===newAccount) return;
  const otherUserUsesOld = users.some(u => u.account===oldAccount && u.username!==state.editingUsername);
  const newAccountExists = allAccounts().includes(newAccount);
  if(!otherUserUsesOld && !newAccountExists){
    data.forEach(r=>{ if(r.account===oldAccount) r.account=newAccount; });
  }
  ensureAccountTables(newAccount);
}
function createUser(){
  clearFieldError("newUserName");
  clearFieldError("newUsername");
  clearFieldError("newUserPass");

  const name = document.getElementById("newUserName").value.trim();
  const username = document.getElementById("newUsername").value.trim().toLowerCase();
  const password = document.getElementById("newUserPass").value.trim();
  const role = document.getElementById("newUserRole").value;
  const account = selectedAccount("newUserAccountSelect","newUserAccountNew",name,role);

  let hasError = false;

  if(!name){
    showFieldError("newUserName", "Campo no puede estar vacío");
    hasError = true;
  }
  if(!username){
    showFieldError("newUsername", "Campo no puede estar vacío");
    hasError = true;
  }
  if(username && users.some(u => u.username.toLowerCase() === username)){
    showFieldError("newUsername", "Ese usuario ya existe");
    hasError = true;
  }
  if(!password){
    showFieldError("newUserPass", "Campo no puede estar vacío");
    hasError = true;
  }
  if(hasError) return;

  clearUserDeleted(username);
  users.push({username,password,name,role,account});

  if(account) ensureAccountTables(account);

  saveUsers();
  persistRecords();
  saveCloudDebounced();

  state.userCreateOpen=false;
  showNotice("Usuario creado correctamente.", "Usuario creado", "✓");
}

function saveUserEditModal(){
  const originalUsername = state.userEditUsername;
  const u = users.find(x=>x.username===originalUsername);
  if(!u) return;

  const name = document.getElementById("userEditName").value.trim();
  const username = document.getElementById("userEditUsername").value.trim().toLowerCase();
  const password = document.getElementById("userEditPass").value.trim();
  const role = document.getElementById("userEditRole").value;
  const account = selectedAccount("userEditAccountSelect","userEditAccountNew",name,role);

  if(!name || !username || !password){
    showNotice("Nombre, usuario y contraseña no pueden quedar vacíos.", "Datos incompletos", "!");
    return;
  }

  if(users.some(x=>x.username===username && x.username!==originalUsername)){
    showNotice("Ese usuario ya existe. Usa otro nombre de usuario.", "Usuario duplicado", "!");
    return;
  }

  const oldAccount = u.account;
  state.editingUsername = originalUsername;

  if(username!==originalUsername){
    markUserDeleted(originalUsername);
    clearUserDeleted(username);
  }

  u.name = name;
  u.username = username;
  u.password = password;
  u.role = role;
  u.account = account;

  if(account) renameAccountIfSafe(oldAccount,account);

  saveUsers();
  persistRecords();
  saveCloudDebounced();

  if(state.user && state.user.username===originalUsername){
    state.user = u;
    localStorage.setItem(SESSION_KEY, JSON.stringify(u));
  }

  state.editingUsername = null;
  state.userEditOpen=false;
  state.userEditUsername=null;
  showNotice("Usuario actualizado correctamente.", "Usuario actualizado", "✓");
}
function deleteUser(username){
  const u = users.find(x=>x.username===username);
  if(!u) return;

  if(state.user && state.user.username===username){
    showNotice("No puedes borrar el usuario con la sesión activa.", "Acción no permitida", "!");
    return;
  }

  showConfirm("Borrar usuario", `¿Borrar el usuario ${u.name}?`, "deleteUser", {username:u.username, account:u.account||""});
}
function deleteUserNow(payload, deleteAssociatedTable=false){
  const username = typeof payload==="object" ? payload.username : payload;
  const account = typeof payload==="object" ? payload.account : "";
  const u = users.find(x=>x.username===username);
  if(!u) return;

  markUserDeleted(username);
  users = users.filter(x=>x.username!==username);
  saveUsers();
  saveCloudDebounced();
  if(state.userEditUsername===username){
    state.userEditOpen=false;
    state.userEditUsername=null;
  }

  if(deleteAssociatedTable && account){
    deleteTableNow(account);
    return;
  }

  showNotice("Usuario eliminado correctamente.", "Usuario eliminado", "✓");
}

function rangeLabel(range){
  if(range === "day") return "1_dia";
  if(range === "week") return "1_semana";
  if(range === "month") return "1_mes";
  if(range === "range") return "rango";
  return "fecha";
}
function filteredRowsForExport(account,currency,range,specificDate,dateFrom,dateTo){
  let totalRun = 0;
  const all = rows(account,currency).map(r => {
    totalRun += r.entry - r.exit;
    return {...r,totalRun};
  });

  if(range === "specific"){
    return all.filter(r => r.date === specificDate);
  }

  if(range === "range"){
    if(!dateFrom || !dateTo) return [];
    const start = new Date(dateFrom + "T00:00:00");
    const end = new Date(dateTo + "T23:59:59");
    return all.filter(r => {
      const d = new Date(r.date + "T12:00:00");
      return d >= start && d <= end;
    });
  }

  const now = new Date();
  now.setHours(23,59,59,999);
  const start = new Date(now);
  if(range === "day") start.setDate(now.getDate());
  if(range === "week") start.setDate(now.getDate() - 6);
  if(range === "month") start.setMonth(now.getMonth() - 1);
  start.setHours(0,0,0,0);

  return all.filter(r => {
    const d = new Date(r.date + "T12:00:00");
    return d >= start && d <= now;
  });
}

function updateExportDateState(){
  const selected = document.querySelector('input[name="exportRange"]:checked');
  const value = selected ? selected.value : "week";

  const specificWrap = document.getElementById("exportDateWrap");
  const specificInput = document.getElementById("exportDate");
  const specificEnabled = value === "specific";
  if(specificWrap) specificWrap.classList.toggle("disabled", !specificEnabled);
  if(specificInput) specificInput.disabled = !specificEnabled;

  const rangeWrap = document.getElementById("exportRangeWrap");
  const from = document.getElementById("exportDateFrom");
  const to = document.getElementById("exportDateTo");
  const rangeEnabled = value === "range";
  if(rangeWrap) rangeWrap.classList.toggle("disabled", !rangeEnabled);
  if(from) from.disabled = !rangeEnabled;
  if(to) to.disabled = !rangeEnabled;
}

function excelEscape(v){
  return String(v ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function exportCurrentTable(){
  const accountSelect = document.getElementById("exportAccount");
  const account = accountSelect ? accountSelect.value : currentAccount();
  const currency = state.currency;
  const selected = document.querySelector('input[name="exportRange"]:checked');
  const range = selected ? selected.value : "week";
  const specificDate = document.getElementById("exportDate") ? document.getElementById("exportDate").value : "";
  const dateFrom = document.getElementById("exportDateFrom") ? document.getElementById("exportDateFrom").value : "";
  const dateTo = document.getElementById("exportDateTo") ? document.getElementById("exportDateTo").value : "";
  const dataRows = filteredRowsForExport(account,currency,range,specificDate,dateFrom,dateTo);

  let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>`;
  html += `<table border="1">`;
  html += `<tr><th colspan="${canReview()?6:5}">NEXUS - ${excelEscape(account)} - ${excelEscape(currency)}</th></tr>`;
  html += `<tr><th>Fecha</th><th>Entrada</th><th>Salida</th><th>Descripción</th><th>Total</th>`;
  if(canReview()) html += `<th>Confirmación</th>`;
  html += `</tr>`;

  dataRows.forEach(r => {
    html += `<tr>`;
    html += `<td>${excelEscape(r.date)}</td>`;
    html += `<td>${r.entry || ""}</td>`;
    html += `<td>${r.exit || ""}</td>`;
    html += `<td>${excelEscape(r.desc)}</td>`;
    html += `<td>${r.totalRun}</td>`;
    if(canReview()) html += `<td>${r.confirmed ? "Confirmada" : "Pendiente"}</td>`;
    html += `</tr>`;
  });

  html += `</table></body></html>`;

  const filename = `NEXUS_${account}_${currency}_${rangeLabel(range)}.xls`;
  const blob = new Blob(["\\ufeff" + html], {type:"application/vnd.ms-excel;charset=utf-8;"});

  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = filename;
  link.style.display = "none";
  document.body.appendChild(link);
  link.click();

  setTimeout(function(){
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }, 250);

  state.exportOpen = false;
  render();
}

function updateCountDiff(){
  const input = document.getElementById("countAmount");
  const result = document.getElementById("countResult");
  if(!input || !result) return;

  const counted = Number(input.value || 0);
  const expected = balance(currentAccount(), state.currency);
  const diff = counted - expected;

  result.classList.remove("ok","bad");

  if(!input.value){
    result.textContent = `Saldo según excel: ${money(expected)} ${state.currency}`;
    return;
  }

  if(diff === 0){
    result.classList.add("ok");
    result.textContent = "Coincide. Diferencia: 0";
  }else{
    result.classList.add("bad");
    result.textContent = diff > 0
      ? `Sobra: ${money(diff)} ${state.currency}`
      : `Falta: ${money(Math.abs(diff))} ${state.currency}`;
  }
}

function saveEditMovement(){
  clearFieldError("editDate");
  clearFieldError("editAmount");
  clearFieldError("editDesc");

  const r = data.find(x => x.id === state.editId);
  if(!r) return;
  if(r.confirmed){ showNotice("Este registro fue confirmado por un administrador o supervisor y no se puede cambiar."); closeEditModal(); return; }

  const amount = Number(document.getElementById("editAmount").value || 0);
  const type = document.getElementById("editType").value;
  const desc = document.getElementById("editDesc").value.trim();
  const date = document.getElementById("editDate").value;

  let hasError = false;
  if(!date){
    showFieldError("editDate", "Campo no puede estar vacío");
    hasError = true;
  }
  if(date && date > new Date().toISOString().slice(0,10)){
    showFieldError("editDate", "La fecha no puede ser superior a la actual");
    hasError = true;
  }
  if(amount <= 0){
    showFieldError("editAmount", "Campo no puede estar vacío");
    hasError = true;
  }
  if(!desc){
    showFieldError("editDesc", "Campo no puede estar vacío");
    hasError = true;
  }
  if(hasError) return;

  r.date = date;
  r.entry = type === "entrada" ? amount : 0;
  r.exit = type === "salida" ? amount : 0;
  r.desc = desc;
  queueRecordUpsert(r);

  recalculateAfterChange();
}

function deleteEditMovement(){
  const id = state.editId;
  if(!id) return;
  const reg = data.find(x => x.id === id);
  if(reg && reg.confirmed){ showNotice("Este registro fue confirmado por un administrador o supervisor y no se puede borrar."); closeEditModal(); return; }

  const before = data.length;
  if(reg) queueRecordDelete(reg);
  data = data.filter(x => String(x.id) !== String(id));

  if(data.length === before){
    showNotice("No se pudo borrar el registro.", "Error", "!");
    return;
  }

  recalculateAfterChange();
}

function isEditableElement(el){
  if(!el) return false;
  const tag=(el.tagName||"").toLowerCase();
  return tag==="input" || tag==="textarea" || tag==="select" || el.isContentEditable;
}
function isFormEditing(){
  return isEditableElement(document.activeElement);
}
function isModalFormOpen(){
  return !!(
    state?.addOpen ||
    state?.editOpen ||
    state?.countOpen ||
    state?.exportOpen ||
    state?.userCreateOpen ||
    state?.userEditOpen ||
    state?.dateFilterOpen ||
    state?.confirmOpen
  );
}
function shouldDeferCloudRender(){
  return isFormEditing() || isModalFormOpen();
}
function setupInputFocusGuards(){
  if(window.__nexusInputGuardsReady) return;
  window.__nexusInputGuardsReady=true;
  document.addEventListener("focusin",e=>{
    if(isEditableElement(e.target)){
      document.body.classList.add("input-active");
    }
  },true);
  document.addEventListener("focusout",e=>{
    if(isEditableElement(e.target)){
      setTimeout(()=>{
        document.body.classList.remove("input-active");
        // No aplicar snapshots aquí: en móvil, al esconderse el teclado se dispara focusout.
        // Si renderizamos en este punto, se reconstruye el modal y se pierde lo escrito.
      },180);
    }
  },true);
}

const NEXUS_APPLIED_OPS_KEY = "nexus_applied_ops_v1";
let nexusAppliedOps = JSON.parse(localStorage.getItem(NEXUS_APPLIED_OPS_KEY)||"{}");

function saveAppliedOps(){
  const keys=Object.keys(nexusAppliedOps);
  if(keys.length>3000){
    keys.sort((a,b)=>Number(nexusAppliedOps[a]||0)-Number(nexusAppliedOps[b]||0));
    keys.slice(0,keys.length-1800).forEach(k=>delete nexusAppliedOps[k]);
  }
  localStorage.setItem(NEXUS_APPLIED_OPS_KEY, JSON.stringify(nexusAppliedOps));
}
function opAlreadyApplied(op){
  return !!(op && op.opId && nexusAppliedOps[op.opId]);
}
function markOpApplied(op){
  if(op && op.opId){
    nexusAppliedOps[op.opId]=Date.now();
    saveAppliedOps();
  }
}
function upsertRecordLocal(rec, renderAfter=false){
  if(!rec) return;
  rec=normalizeRecord(JSON.parse(JSON.stringify(rec)));
  const delAt=deletedAtFor(rec.id,deletedRecords);
  if(recordTimestamp(rec)<=delAt) return;

  const idx=data.findIndex(r=>String(r.id)===String(rec.id));
  if(idx>=0){
    const old=data[idx];
    if(recordTimestamp(rec)>=recordTimestamp(old)){
      data[idx]=rec;
    }
  }else{
    data.push(rec);
  }
  data=mergeRecords(data,data,deletedRecords);
  persistRecords();
  if(renderAfter && !shouldDeferCloudRender()) render();
}
function deleteRecordLocalById(id, deletedAt=Date.now(), renderAfter=false){
  addDeletedTombstone(id,deletedAt);
  data=data.filter(r=>String(r.id)!==String(id));
  persistRecords();
  saveDeletedRecords();
  if(renderAfter && !shouldDeferCloudRender()) render();
}
function applyRemoteOp(op, renderAfter=false){
  if(!op || !op.type || !op.id) return;
  // Idempotente: si llega repetido, no cambia dos veces.
  if(opAlreadyApplied(op)) return;

  if(op.type==="delete"){
    deleteRecordLocalById(op.id, op.deletedAt||op.ts||Date.now(), false);
  }else if(op.type==="upsert" && op.record){
    upsertRecordLocal(op.record, false);
  }

  markOpApplied(op);
  if(renderAfter && !shouldDeferCloudRender()) render();
}

  ]);
}

function stableRecordForHash(r){
  return {
    id:String(r.id),
    account:String(r.account||""),
    currency:String(r.currency||""),
    date:String(r.date||""),
    entry:Number(r.entry||0),
    exit:Number(r.exit||0),
    desc:String(r.desc||""),
    confirmed:!!r.confirmed,
    count:!!r.count
  };
}
function hashString(str){
  let h=2166136261;
  for(let i=0;i<str.length;i++){
    h^=str.charCodeAt(i);
    h=Math.imul(h,16777619);
  }
  return (h>>>0).toString(16);
}
function tableHashFromRecords(records, account, currency){
  const rows=(records||[])
    .filter(r=>!r._deleted && r.account===account && r.currency===currency)
    .map(stableRecordForHash)
    .sort((a,b)=>String(a.id).localeCompare(String(b.id)));
  return hashString(JSON.stringify(rows));
}
function currentLocalTableHash(){

}
function currentCloudTableHash(){

function cleanSupabaseUrl(){
  let url=String(supabaseConfig().url || "").trim().replace(/\/+$/,"");
  url=url.replace(/\/rest\/v1$/i,"");
  return url;
}
function supabaseRestUrl(table, query=""){
  const base=`${cleanSupabaseUrl()}/rest/v1/${table}`;
  return query ? `${base}?${query}` : base;
}
function supabaseHeaders(prefer=""){
  const key=supabaseKey();
  const h={
    "apikey":key,
    "Content-Type":"application/json",
    "Accept":"application/json"
  };
  if(key.startsWith("eyJ") && key.split(".").length===3){
    h["Authorization"]=`Bearer ${key}`;
  }
  if(prefer) h["Prefer"]=prefer;
  return h;
}
async function supabaseFetch(table, query="", options={}, timeout=18000){
  const ctrl=new AbortController();
  const t=setTimeout(()=>ctrl.abort(),timeout);
  try{
    const res=await fetch(supabaseRestUrl(table, query), {
      ...options,
      signal:ctrl.signal,
      cache:"no-store"
    });
    const txt=await res.text();
    let body=null;
    try{ body=txt ? JSON.parse(txt) : null; }catch(e){ body=txt; }
    if(!res.ok){
      const detail=typeof body==="string"?body:JSON.stringify(body);
      console.error("NEXUS Supabase REST error",{status:res.status,table,detail});
      throw new Error(`Supabase ${res.status}: ${detail}`);
    }
    return body;
  }finally{
    clearTimeout(t);
  }
}
function cloudPayload(){

function recordDocPayloadFromOp(op){

      id:op.id,

      deletedAt:op.deletedAt||op.ts||Date.now(),
      _updatedAt:op.deletedAt||op.ts||Date.now(),
      _clientId:op.clientId||DEVICE_ID,
      clientId:op.clientId||DEVICE_ID,
      opId:op.opId||"",
      type:"delete"
    };
  }
  const rec=normalizeRecord(JSON.parse(JSON.stringify(op.record||{})));
  rec._deleted=false;
  rec._clientId=op.clientId||DEVICE_ID;
  rec.opId=op.opId||"";
  rec.type="upsert";
  return rec;
}
function auditPayloadFromOp(op,method,status="ok",error=""){
  return {
    opId:String(op.opId||""),
    id:String(op.id||""),
    type:String(op.type||""),
    account:String(op.record?.account || ""),

async function writeAudit(op,method,status="ok",error=""){
  if(!validCloudConfig()) return false;
  const payload=auditPayloadFromOp(op,method,status,error);
  const row={
    cloud_doc: cloudDocId(),

  };
  try{
    await supabaseFetch(
      "nexus_audit",
      "on_conflict=cloud_doc,op_id",
      {
        method:"POST",
        headers:supabaseHeaders("resolution=merge-duplicates,return=minimal"),
        body:JSON.stringify(row)
      },
      12000
    );
    return true;
  }catch(e){
    console.warn("Auditoría Supabase falló:",e);
    return false;
  }
}
function applyRecordDoc(docData, renderAfter=false){
  if(!docData || !docData.id) return;
  if(docData._deleted){
    deleteRecordLocalById(docData.id,docData.deletedAt||docData._updatedAt||Date.now(),false);
  }else{
    const rec=JSON.parse(JSON.stringify(docData));
    delete rec.updated_at;
    upsertRecordLocal(rec,false);
  }
  const activeCloud=(nexusCloud.cloudRecordsCache||[]).filter(r=>String(r.id)!==String(docData.id));
  if(!docData._deleted){
    activeCloud.push(JSON.parse(JSON.stringify(docData)));
  }
  nexusCloud.cloudRecordsCache=mergeRecords(activeCloud,[],deletedRecords);
  if(renderAfter && !shouldDeferCloudRender()) render();
}
async function uploadOpsAsRecordDocs(ops){
  if(!ops || !ops.length) return true;
  if(!validCloudConfig()) return false;

  for(let i=0;i<ops.length;i+=300){
    const chunk=ops.slice(i,i+300);
    const rows=chunk.map(op=>{
      const payload=recordDocPayloadFromOp(op);
      return {
        cloud_doc: cloudDocId(),
        record_id: String(op.id),
        payload,
        updated_at_client: Number(payload._updatedAt || payload.deletedAt || op.ts || Date.now()),
        deleted: !!payload._deleted
      };
    });

    await supabaseFetch(
      "nexus_records",
      "on_conflict=cloud_doc,record_id",
      {
        method:"POST",
        headers:supabaseHeaders("resolution=merge-duplicates,return=minimal"),
        body:JSON.stringify(rows)
      },
      22000
    );
  }

  for(const op of ops) await writeAudit(op,"supabase-records","ok","");
  await uploadMetadataSupabase();
  return true;
}
async function fallbackSyncMainDoc(opsToFlush){
  const baseDeleted=mergeDeletedRecords(nexusCloud.cloudDeletedCache||[],deletedRecords);
  const baseRecords=mergeRecords(nexusCloud.cloudRecordsCache||[],data,baseDeleted);
  const applied=applyOpsToState(baseRecords,baseDeleted,opsToFlush);
  const finalRecords=applied.records;
  const finalDeleted=applied.deletedRecords;

  const payload={
    users:filterDeletedUsers(users),
    deletedUsers:normalizeDeletedUsers(deletedUsers),
    records:finalRecords,
    deletedRecords:finalDeleted,
    disabledTables,
    settings:settings(),
    resetVersion:NEXUS_RESET_VERSION,
    updatedAtClient:Date.now(),
    clientId:DEVICE_ID,
    fallback:true
  };

  await uploadMetadataSupabase(payload);

  data=finalRecords;
  deletedRecords=finalDeleted;
  nexusCloud.cloudRecordsCache=finalRecords;
  nexusCloud.cloudDeletedCache=finalDeleted;
  persistRecords();
  saveDeletedRecords();

  for(const op of opsToFlush) await writeAudit(op,"supabase-main-fallback","ok","");
  return true;
}
async function pollCloudRecordsSupabase(renderAfter=false){
  if(!validCloudConfig()) return false;
  try{
    const q=`cloud_doc=eq.${encodeURIComponent(cloudDocId())}&select=record_id,payload,updated_at_client,deleted&order=updated_at_client.desc&limit=1600`;
    const rows=await supabaseFetch("nexus_records", q, {method:"GET", headers:supabaseHeaders()}, 22000);

    const cloudDeleted=[];
    const cloudActive=[];
    (rows||[]).forEach(row=>{
      const r=row.payload || {};
      if(row.deleted || r._deleted){
        cloudDeleted.push({id:r.id || row.record_id, deletedAt:r.deletedAt||r._updatedAt||row.updated_at_client||Date.now(), clientId:r._clientId||""});
      }else if(r.id){
        cloudActive.push(r);
      }
    });

    nexusCloud.cloudDeletedCache=mergeDeletedRecords(cloudDeleted,nexusCloud.cloudDeletedCache||[]);
    nexusCloud.cloudRecordsCache=mergeRecords(cloudActive,nexusCloud.cloudRecordsCache||[],nexusCloud.cloudDeletedCache);

    deletedRecords=mergeDeletedRecords(deletedRecords,nexusCloud.cloudDeletedCache);
    data=mergeRecords(nexusCloud.cloudRecordsCache,data,deletedRecords);
    persistRecords();
    saveDeletedRecords();

    nexusCloud.ready=true;
    if(!offlineOps.length && !nexusCloud.syncing && currentLocalTableHash()===currentCloudTableHash()){
      nexusCloud.lastSyncOk=true;
      nexusCloud.error="";
    }
    updateSyncDotVisual();
    if(renderAfter && !shouldDeferCloudRender()) render();
    return true;
  }catch(e){
    console.warn("Supabase poll records falló:",e);
    nexusCloud.error=String(e.message||e);
    nexusCloud.lastSyncOk=false;
    updateSyncDotVisual();
    return false;
  }
}
async function flushPendingOps(){
  if(!nexusCloud.enabled || nexusCloud.syncing) return;
  if(!offlineOps.length) return;

  if(navigator.onLine===false){
    nexusCloud.lastSyncOk=false;
    updateSyncDotVisual();
    return;
  }

  nexusCloud.syncing=true;
  nexusCloud.pendingWrites=true;
  nexusCloud.lastSyncOk=false;
  updateSyncDotVisual();

  const opsToFlush=[...offlineOps];
  const opIds=new Set(opsToFlush.map(op=>op.opId));

  try{
    let saved=false;
    try{
      saved=await uploadOpsAsRecordDocs(opsToFlush);
    }catch(e){
      console.warn("Supabase records falló, usando respaldo metadata:",e);
      saved=false;
    }

    if(!saved){
      saved=await fallbackSyncMainDoc(opsToFlush);
    }

    if(!saved) throw new Error("No se pudo confirmar guardado remoto en Supabase");

    const applied=applyOpsToState(nexusCloud.cloudRecordsCache||[],nexusCloud.cloudDeletedCache||[],opsToFlush);
    nexusCloud.cloudRecordsCache=applied.records;
    nexusCloud.cloudDeletedCache=applied.deletedRecords;

    offlineOps=offlineOps.filter(op=>!opIds.has(op.opId));
    saveOfflineOps();

    nexusCloud.error="";
    nexusCloud.syncing=false;
    nexusCloud.pendingWrites=false;
    nexusCloud.lastSyncOk=!offlineOps.length && currentLocalTableHash()===currentCloudTableHash();
    nexusCloud.lastSyncAt=Date.now();
    updateSyncDotVisual();

    setTimeout(()=>pollCloudRecordsSupabase(false),1200);

    if(offlineOps.length){
      setTimeout(flushPendingOps,800);
    }
  }catch(e){
    console.error("NEXUS Supabase sync error:",e);
    nexusCloud.error=String(e.message||e);
    nexusCloud.lastSyncOk=false;
    nexusCloud.syncing=false;
    nexusCloud.pendingWrites=false;
    updateSyncDotVisual();
    setTimeout(()=>{
      if(navigator.onLine!==false && offlineOps.length && !nexusCloud.syncing) flushPendingOps();
    },2500);
  }finally{
    if(!shouldDeferCloudRender()) render();
  }
}
function saveCloudDebounced(){
  persistAllLocal();
  if(nexusCloud.applying) return;
  if(!validCloudConfig()){
    nexusCloud.enabled=false;
    nexusCloud.error="Supabase sin configurar";
    nexusCloud.lastSyncOk=false;
    updateSyncDotVisual();
    return;
  }
  nexusCloud.enabled=true;
  clearTimeout(nexusCloud.saveTimer);
  nexusCloud.saveTimer=setTimeout(async ()=>{
    try{
      nexusCloud.pendingWrites=true;
      nexusCloud.lastSyncOk=false;
      updateSyncDotVisual();

      await uploadMetadataSupabase();

      if(offlineOps.length){
        await flushPendingOps();
      }else{
        await pollCloudRecordsSupabase(false);
      }

      nexusCloud.error="";
      nexusCloud.pendingWrites=false;
      nexusCloud.ready=true;
      nexusCloud.lastSyncOk=currentLocalTableHash()===currentCloudTableHash();
      updateSyncDotVisual();
    }catch(e){
      console.warn("Guardado Supabase falló:",e);
      nexusCloud.error=String(e.message||e);
      nexusCloud.pendingWrites=false;
      nexusCloud.lastSyncOk=false;
      updateSyncDotVisual();
    }
  },420);
}
function applyCloudSnapshot(payload){
  if(!payload) return;
  if(nexusCloud.syncing || shouldDeferCloudRender()){
    nexusCloud.pendingPayload=payload;
    return;
  }
  nexusCloud.applying=true;
  try{
    if(Array.isArray(payload.deletedUsers)){
      deletedUsers=normalizeDeletedUsers([...deletedUsers,...payload.deletedUsers]);
      saveDeletedUsers();
    }
    if(Array.isArray(payload.users)){
      users=filterDeletedUsers(payload.users);
      if(!users.some(u=>u.username==="admin")){
        users.unshift({username:"admin",password:"1234",name:"Administrador",role:"administrador",account:null});
      }
      localStorage.setItem('nexus_users_v1', JSON.stringify(users));
    }
    if(Array.isArray(payload.disabledTables)){
      disabledTables=payload.disabledTables;
      localStorage.setItem(DISABLED_TABLES_KEY, JSON.stringify(disabledTables));
    }
    if(payload.settings) localStorage.setItem(SETTINGS_KEY, JSON.stringify(payload.settings));

    const remoteDeleted=Array.isArray(payload.deletedRecords)?payload.deletedRecords:[];
    deletedRecords=mergeDeletedRecords(remoteDeleted,deletedRecords);
    saveDeletedRecords();

    if(Array.isArray(payload.records)){
      nexusCloud.cloudRecordsCache=mergeRecords(payload.records,nexusCloud.cloudRecordsCache||[],deletedRecords);
      data=mergeRecords(nexusCloud.cloudRecordsCache,data,deletedRecords);
      persistRecords();
    }
    applySettings();
  }finally{
    nexusCloud.applying=false;
  }
}
function applyPendingCloudIfAny(){
  if(nexusCloud.pendingPayload && !nexusCloud.syncing && !shouldDeferCloudRender()){
    const payload=nexusCloud.pendingPayload;
    nexusCloud.pendingPayload=null;
    applyCloudSnapshot(payload);
    render();
  }
}
async function initCloudSync(){
  if(nexusCloud.initialized) return;
  nexusCloud.initialized=true;

  nexusCloud.cloudRecordsCache=[];
  nexusCloud.cloudDeletedCache=[];
  nexusCloud.enabled=false;
  nexusCloud.ready=false;
  nexusCloud.error="";

  if(!validCloudConfig()){
    console.warn("NEXUS: Supabase no configurado.");
    nexusCloud.lastSyncOk=false;
    updateSyncDotVisual();
    return;
  }

  nexusCloud.enabled=true;

  try{
    const hasMeta=await readMetadataSupabase(false);
    if(!hasMeta){
      await uploadMetadataSupabase();
    }

    await pollCloudRecordsSupabase(true);

    if(data.length && !(nexusCloud.cloudRecordsCache||[]).length && !offlineOps.length){
      // Primer arranque sobre una nube vacía: sube registros locales existentes si los hubiera.
      data.forEach(r=>queueRecordUpsert(r));
    }

    if(offlineOps.length){
      await flushPendingOps();
    }else{
      nexusCloud.lastSyncOk=currentLocalTableHash()===currentCloudTableHash();
      nexusCloud.ready=true;
      updateSyncDotVisual();
    }

    setInterval(async ()=>{
      updateSyncDotVisual();
      if(navigator.onLine!==false){
        if(offlineOps.length && !nexusCloud.syncing){
          await flushPendingOps();
        }else{
          await readMetadataSupabase(false);
          await pollCloudRecordsSupabase(false);
        }
      }
    },3500);

  }catch(e){
    console.error("NEXUS Supabase init error:",e);
    nexusCloud.error=String(e.message||e);
    nexusCloud.lastSyncOk=false;
    updateSyncDotVisual();
  }
}
window.addEventListener("online",()=>{
  nexusCloud.lastSyncOk=false;
  updateSyncDotVisual();
  setTimeout(()=>{readMetadataSupabase(false);pollCloudRecordsSupabase(false);flushPendingOps();},500);
});

  nexusCloud.pendingWrites=false;
  updateSyncDotVisual();
});
setInterval(()=>{
  updateSyncDotVisual();
  applyPendingCloudIfAny();
},700);

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./service-worker.js").catch(e=>console.warn("Service worker no registrado:",e));
  });
}

initCloudSync();
render();

</script>
